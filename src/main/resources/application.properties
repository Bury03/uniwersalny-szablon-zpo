# ============================================================
# APPLICATION
# ============================================================

spring.application.name=egzamin

# ============================================================
# H2 DATABASE
# ============================================================
# Baza dzia?a w pami?ci.
# Po restarcie aplikacji dane si? odtwarzaj? przez DataInitializer.

spring.datasource.url=jdbc:h2:mem:egzamindb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# H2 CONSOLE
# ============================================================
# Konsola bazy:
# http://localhost:8080/h2-console
#
# JDBC URL:
# jdbc:h2:mem:egzamindb

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / HIBERNATE
# ============================================================
# update = Hibernate tworzy/aktualizuje tabele na podstawie encji.

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# THYMELEAF
# ============================================================

spring.thymeleaf.cache=false

# ============================================================
# SERVER
# ============================================================

server.port=8080